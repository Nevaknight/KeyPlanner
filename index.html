<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХОЧУ ИГРАТЬ</title>
    <!-- Иконка песочных часов -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⌛%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden-view { display: none !important; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight cursor-pointer flex items-center gap-2" onclick="showView('dashboard')">
                <span>⌛</span> ХОЧУ ИГРАТЬ
            </h1>
            <div id="nav-user" class="hidden flex items-center gap-4">
                <span id="nav-player-name" class="font-bold text-blue-600 hidden sm:inline-block"></span>
                <button id="nav-btn-dashboard" onclick="showView('dashboard')" class="text-sm px-3 py-1.5 rounded-md transition font-medium">Расписание</button>
                <button id="nav-btn-form" onclick="showView('form')" class="text-sm px-3 py-1.5 rounded-md transition font-medium">Моя анкета</button>
                <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 transition font-bold px-2">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
        
        <!-- ЭКРАН 1: ЛОГИН -->
        <div id="view-login" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mt-10">
            <h2 class="text-2xl font-bold text-center mb-6">Вход</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Имя</label>
                    <div class="relative">
                        <select id="login-player" class="w-full border border-slate-300 rounded-lg p-2.5 pl-3 pr-10 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white font-medium appearance-none invalid:text-slate-400" required onchange="this.classList.remove('text-slate-400')">
                            <option value="" disabled selected hidden>Выбери своё имя</option>
                            <option value="Сейлоркринж" class="text-slate-800">Сейлоркринж</option>
                            <option value="Рейнон" class="text-slate-800">Рейнон</option>
                            <option value="Рид" class="text-slate-800">Рид</option>
                            <option value="Рипыч" class="text-slate-800">Рипыч</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
                    <input type="password" id="login-password" class="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-slate-400 font-medium" placeholder="Введи пароль">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition mt-2 shadow-sm">
                    Войти
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden mt-2 font-medium">Неверный пароль!</p>
            </div>
        </div>

        <!-- ЭКРАН 2: СВОДНАЯ ТАБЛИЦА (DASHBOARD) -->
        <div id="view-dashboard" class="hidden-view space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div>
                    <h2 id="dashboard-status-text" class="text-3xl sm:text-4xl font-black text-slate-900 tracking-tight">Ожидание данных...</h2>
                </div>
                <button onclick="loadAllData()" class="text-sm bg-white border border-slate-300 hover:bg-slate-50 px-4 py-2.5 rounded-lg transition flex items-center justify-center gap-2 font-bold shadow-sm w-full sm:w-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Обновить данные
                </button>
            </div>
            
            <div id="dashboard-loading" class="text-center py-20 hidden bg-white rounded-2xl shadow-sm border border-slate-200">
                <div class="inline-block w-10 h-10 border-4 border-slate-200 border-t-blue-600 rounded-full loader mb-4"></div>
                <p class="text-slate-500 font-medium">Загружаем расписание и опросы...</p>
            </div>

            <div id="dashboard-content" class="space-y-8">
                <!-- Сюда будет рендериться контент -->
            </div>
        </div>

        <!-- ЭКРАН 3: АНКЕТА ИГРОКА -->
        <div id="view-form" class="hidden-view">

            <!-- БЛОК: ВИКЛИ НОУ ЛИВЕРС (ТОЛЬКО РЕЙНОН) -->
            <div id="wnl-builder-container" class="bg-gradient-to-br from-purple-50 to-white rounded-2xl shadow-sm border border-purple-200 p-6 sm:p-8 mb-6 hidden">
                <h2 class="text-2xl font-black text-purple-900 tracking-tight mb-6 text-center uppercase">Создание опроса "Викли ноу ливерс"</h2>
                <div class="space-y-4 max-w-2xl mx-auto">
                    <div class="flex flex-col sm:flex-row gap-4">
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-slate-700 mb-1">Дата</label>
                            <select id="wnl-date" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-purple-500 bg-white font-medium shadow-sm"></select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-slate-700 mb-1">Время старта</label>
                            <input type="time" id="wnl-time" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-purple-500 font-medium shadow-sm cursor-pointer" onclick="this.showPicker()" onchange="document.getElementById('wnl-options').classList.remove('hidden')">
                        </div>
                    </div>

                    <div id="wnl-options" class="hidden space-y-4 pt-4">
                        <div class="flex flex-col gap-3">
                            <label class="flex flex-wrap items-center gap-3 cursor-pointer p-4 border border-slate-200 bg-white rounded-xl hover:bg-slate-50 transition shadow-sm">
                                <input type="radio" name="wnl-type" value="hours" class="w-5 h-5 text-purple-600 focus:ring-purple-500" checked onchange="toggleWnl()">
                                <span class="font-bold text-slate-800">Добавить шаг в часах:</span>
                                <input type="number" id="wnl-hours-count" class="border border-slate-300 rounded-md p-2 w-24 outline-none focus:border-purple-500 ml-auto text-center font-bold" placeholder="Кол-во">
                            </label>

                            <label class="flex flex-wrap items-center gap-3 cursor-pointer p-4 border border-slate-200 bg-white rounded-xl hover:bg-slate-50 transition shadow-sm">
                                <input type="radio" name="wnl-type" value="minutes" class="w-5 h-5 text-purple-600 focus:ring-purple-500" onchange="toggleWnl()">
                                <span class="font-bold text-slate-800">Добавить шаг в минутах:</span>
                                <div class="flex items-center gap-2 ml-auto">
                                    <input type="number" id="wnl-mins-size" class="border border-slate-300 rounded-md p-2 w-20 outline-none focus:border-purple-500 text-center bg-slate-100 font-bold" placeholder="Мин" disabled>
                                    <span class="text-sm font-bold text-slate-400">×</span>
                                    <input type="number" id="wnl-mins-count" class="border border-slate-300 rounded-md p-2 w-24 outline-none focus:border-purple-500 text-center bg-slate-100 font-bold" placeholder="Кол-во" disabled>
                                </div>
                            </label>
                        </div>
                        
                        <button onclick="createWnl()" class="w-full mt-2 bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-xl transition shadow-md text-lg tracking-wide uppercase">
                            Создать и опубликовать опрос
                        </button>
                    </div>
                </div>
            </div>

            <!-- Блок 2: Текущая неделя -->
            <div id="week1-container" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                <h3 class="text-xl font-black text-slate-800 mb-6 text-center uppercase tracking-wide">Текущая неделя</h3>
                <div class="overflow-x-auto custom-scrollbar pb-2">
                    <table class="w-full border-collapse min-w-[500px]">
                        <thead>
                            <tr class="text-sm text-slate-500 border-b border-slate-200">
                                <th class="pb-3 font-bold px-2 w-[25%] text-center">Дата</th>
                                <th class="pb-3 font-bold px-2 w-[15%] text-center">Статус</th>
                                <th class="pb-3 font-bold px-2 w-[40%] text-center">Время</th>
                                <th class="pb-3 font-bold px-2 w-[20%] text-center">Добавить время</th>
                            </tr>
                        </thead>
                        <tbody id="form-body-week1" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Блок 3: Следующая неделя -->
            <div id="week2-container" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                <h3 class="text-xl font-black text-slate-800 mb-6 text-center uppercase tracking-wide">Следующая неделя</h3>
                <div class="overflow-x-auto custom-scrollbar pb-2">
                    <table class="w-full border-collapse min-w-[500px]">
                        <thead>
                            <tr class="text-sm text-slate-500 border-b border-slate-200">
                                <th class="pb-3 font-bold px-2 w-[25%] text-center">Дата</th>
                                <th class="pb-3 font-bold px-2 w-[15%] text-center">Статус</th>
                                <th class="pb-3 font-bold px-2 w-[40%] text-center">Время</th>
                                <th class="pb-3 font-bold px-2 w-[20%] text-center">Добавить время</th>
                            </tr>
                        </thead>
                        <tbody id="form-body-week2" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Блок 4: Рейдовые дни (Среда - Вторник) -->
            <div id="raid-days-container" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-xl font-black text-slate-800 mb-6 text-center uppercase tracking-wide">Рейдовые дни</h3>
                <div class="overflow-x-auto custom-scrollbar pb-2">
                    <table class="w-full border-collapse min-w-[400px]">
                        <thead>
                            <tr class="text-sm text-slate-500 border-b border-slate-200">
                                <th class="pb-3 font-bold px-2 w-[30%] text-center">День недели</th>
                                <th class="pb-3 font-bold px-2 w-[50%] text-center">Время</th>
                                <th class="pb-3 font-bold px-2 w-[20%] text-center">Добавить время</th>
                            </tr>
                        </thead>
                        <tbody id="form-body-raid" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Плавающая кнопка Сохранить -->
    <button id="floating-save-btn" onclick="saveForm()" class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-2xl z-40 transition-all duration-300 transform translate-y-24 opacity-0 flex items-center gap-2 pointer-events-none">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span id="floating-save-text">Сохранить</span>
    </button>

    <!-- Уведомления (перенесены в правый ВЕРХНИЙ угол) -->
    <div id="message-box" class="fixed top-20 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 text-white font-medium hidden transition-all duration-300 transform -translate-y-4 opacity-0 flex items-center gap-3">
        <span id="message-icon"></span>
        <span id="message-text"></span>
    </div>

    <script>
        // ==========================================
        const TOKEN_PART_1 = 'github_pat_11AVPVAWY0ePzqamRGnq9g_'; 
        const TOKEN_PART_2 = 'BC7Dk6egQINo2Ov5LVH59PguyVwKS5nbpYLMIQmR3THXKAIBS45KnOiguhn'; 
        const GITHUB_TOKEN = TOKEN_PART_1 + TOKEN_PART_2; 
        const REPO_OWNER = 'Nevaknight';
        const REPO_NAME = 'KeyPlanner';
        // ==========================================

        const PLAYERS = ['Сейлоркринж', 'Рейнон', 'Рид', 'Рипыч'];
        const PASSWORDS = { 'Рид': 'R1234', 'Рипыч': 'DHtop', 'Сейлоркринж': 'R1234', 'Рейнон': 'R1234' };
        
        const dayNamesFull = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const dayNamesShort = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
        const RAID_DAYS = ['Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье', 'Понедельник', 'Вторник'];
        const RAID_DAYS_MAP = {
            'Среда': 'СР', 'Четверг': 'ЧТ', 'Пятница': 'ПТ', 'Суббота': 'СБ',
            'Воскресенье': 'ВС', 'Понедельник': 'ПН', 'Вторник': 'ВТ'
        };
        
        let currentUser = null;
        let generatedDates = []; 
        let isFormDirty = false;

        function getMoscowISO() {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 3)); 
        }

        function generateTwoWeeks() {
            let moscowDate = getMoscowISO();
            let day = moscowDate.getDay();
            let diffToWednesday = day >= 3 ? day - 3 : day + 4;
            
            let startOfWeek = new Date(moscowDate);
            startOfWeek.setDate(moscowDate.getDate() - diffToWednesday);
            startOfWeek.setHours(0,0,0,0);

            let todayIso = getMoscowISO().toISOString().split('T')[0];

            generatedDates = [];
            for (let i = 0; i < 14; i++) {
                let tempD = new Date(startOfWeek);
                tempD.setDate(startOfWeek.getDate() + i);
                let isoDate = tempD.toISOString().split('T')[0];
                
                generatedDates.push({
                    iso: isoDate,
                    datePart: `${tempD.getDate().toString().padStart(2, '0')}.${(tempD.getMonth() + 1).toString().padStart(2, '0')}`,
                    dayPart: dayNamesFull[tempD.getDay()],
                    dayPartShort: dayNamesShort[tempD.getDay()],
                    display: `${tempD.getDate().toString().padStart(2, '0')}.${(tempD.getMonth() + 1).toString().padStart(2, '0')} - ${dayNamesFull[tempD.getDay()]}`,
                    isPast: isoDate < todayIso 
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateTwoWeeks();
            const savedUser = localStorage.getItem('wow_user');
            if (savedUser && PLAYERS.includes(savedUser)) {
                currentUser = savedUser;
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('nav-player-name').innerText = currentUser;
                showView('dashboard');
            } else {
                showView('login');
            }
        });

        function showMessage(msg, type = 'info') {
            const box = document.getElementById('message-box');
            const text = document.getElementById('message-text');
            const icon = document.getElementById('message-icon');
            
            text.textContent = msg;
            
            if (type === 'error') {
                box.className = `fixed top-20 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 text-white font-medium transition-all duration-300 bg-red-600 flex items-center gap-3`;
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`;
            } else if (type === 'success') {
                box.className = `fixed top-20 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 text-white font-medium transition-all duration-300 bg-emerald-600 flex items-center gap-3`;
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`;
            } else {
                box.className = `fixed top-20 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 text-white font-medium transition-all duration-300 bg-slate-800 flex items-center gap-3`;
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`;
            }
            
            box.classList.remove('hidden');
            setTimeout(() => {
                box.classList.add('opacity-0', '-translate-y-4');
                box.classList.remove('translate-y-0', 'opacity-100');
                setTimeout(() => box.classList.add('hidden'), 300);
            }, 5000);
            
            // Включаем анимацию появления
            requestAnimationFrame(() => {
                box.classList.remove('opacity-0', '-translate-y-4');
                box.classList.add('translate-y-0', 'opacity-100');
            });
        }

        function markFormDirty() {
            if (!isFormDirty) {
                isFormDirty = true;
                const floatBtn = document.getElementById('floating-save-btn');
                floatBtn.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
                floatBtn.classList.add('translate-y-0', 'opacity-100');
            }
        }

        function markFormClean() {
            isFormDirty = false;
            const floatBtn = document.getElementById('floating-save-btn');
            floatBtn.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
            floatBtn.classList.remove('translate-y-0', 'opacity-100');
        }

        function updateNavStyles(activeViewId) {
            const btnDash = document.getElementById('nav-btn-dashboard');
            const btnForm = document.getElementById('nav-btn-form');
            
            const inactiveClasses = "text-slate-600 hover:bg-slate-100 bg-transparent".split(' ');
            const activeClasses = "text-blue-700 bg-blue-50 border border-blue-100 shadow-sm".split(' ');

            btnDash.classList.remove(...activeClasses);
            btnDash.classList.add(...inactiveClasses);
            btnForm.classList.remove(...activeClasses);
            btnForm.classList.add(...inactiveClasses);

            if(activeViewId === 'dashboard') {
                btnDash.classList.remove(...inactiveClasses);
                btnDash.classList.add(...activeClasses);
            } else if(activeViewId === 'form') {
                btnForm.classList.remove(...inactiveClasses);
                btnForm.classList.add(...activeClasses);
            }
        }

        function showView(viewId) {
            document.getElementById('view-login').classList.add('hidden-view');
            document.getElementById('view-dashboard').classList.add('hidden-view');
            document.getElementById('view-form').classList.add('hidden-view');
            document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
            
            markFormClean();

            updateNavStyles(viewId);

            if (viewId === 'form') {
                loadUserFormFromGitHub();
            } else if (viewId === 'dashboard') {
                loadAllData();
            }
        }

        function login() {
            const player = document.getElementById('login-player').value;
            const password = document.getElementById('login-password').value;
            const errorElem = document.getElementById('login-error');
            
            if (!player) {
                errorElem.innerText = 'Пожалуйста, выбери имя!';
                errorElem.classList.remove('hidden');
                return;
            }
            
            if (PASSWORDS[player] === password) {
                currentUser = player;
                localStorage.setItem('wow_user', player);
                errorElem.classList.add('hidden');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('nav-player-name').innerText = currentUser;
                showView('dashboard');
            } else {
                errorElem.innerText = 'Неверный пароль!';
                errorElem.classList.remove('hidden');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('wow_user');
            document.getElementById('nav-user').classList.add('hidden');
            document.getElementById('login-password').value = '';
            showView('login');
        }

        window.validateTime = function(elem) {
            if (elem.value && elem.value < '08:00') {
                elem.value = ''; // Сбрасываем значение на "пусто" (то есть --:--)
                showMessage('Игровое время начинается с 08:00!', 'error');
            }
            markFormDirty();
        }

        function renderForm(userData = {}) {
            const wnlContainer = document.getElementById('wnl-builder-container');
            if (currentUser === 'Рейнон') {
                wnlContainer.classList.remove('hidden');
                const dateSelect = document.getElementById('wnl-date');
                dateSelect.innerHTML = '<option value="">Выберите дату опроса...</option>';
                generatedDates.forEach(d => {
                    if (!d.isPast) dateSelect.innerHTML += `<option value="${d.iso}">${d.display}</option>`;
                });
            } else {
                wnlContainer.classList.add('hidden');
            }

            const tbody1 = document.getElementById('form-body-week1');
            const tbody2 = document.getElementById('form-body-week2');
            const tbodyRaid = document.getElementById('form-body-raid');
            
            const week1Container = document.getElementById('week1-container');

        window.createWnl = async function() {
            const date = document.getElementById('wnl-date').value;
            const time = document.getElementById('wnl-time').value;
            if(!date || !time) return showMessage('Выберите дату и время старта!', 'error');

            const isHours = document.querySelector('input[name="wnl-type"]:checked').value === 'hours';
            let times = [time];
            let [h, m] = time.split(':').map(Number);
            let currentMins = h * 60 + m;

            if (isHours) {
                const count = parseInt(document.getElementById('wnl-hours-count').value) || 0;
                for(let i=0; i<count; i++) {
                    currentMins += 60;
                    times.push(minsToTime(currentMins));
                }
            } else {
                const stepMins = parseInt(document.getElementById('wnl-mins-size').value) || 0;
                const count = parseInt(document.getElementById('wnl-mins-count').value) || 0;
                for(let i=0; i<count; i++) {
                    currentMins += stepMins;
                    times.push(minsToTime(currentMins));
                }
            }

            showMessage('Создаем опрос...', 'info');
            const fileData = await githubAPI('GET', 'weekly_no_leavers.json');
            let wnlData = {};
            let sha = null;
            if (fileData && fileData.content) {
                sha = fileData.sha;
                wnlData = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
            }

            if(!wnlData[date]) wnlData[date] = {};
            
            times.forEach(t => {
                if(!wnlData[date][t]) wnlData[date][t] = {}; 
                wnlData[date][t][currentUser] = '+'; 
            });

            const jsonString = JSON.stringify(wnlData, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));
            const body = { message: `Create WNL poll for ${date}`, content: base64Content };
            if (sha) body.sha = sha;

            const result = await githubAPI('PUT', 'weekly_no_leavers.json', body);
            if(result) {
                showMessage('Опрос успешно опубликован!', 'success');
                document.getElementById('wnl-time').value = '';
                document.getElementById('wnl-options').classList.add('hidden');
                showView('dashboard');
            } else {
                showMessage('Ошибка при создании', 'error');
            }
        }

        async function githubAPI(method, path, body = null) {
            if (!TOKEN_PART_1 || !TOKEN_PART_2 || GITHUB_TOKEN.length < 10) {
                showMessage('Токен GitHub не настроен. Сохранение невозможно.', 'error');
                return null;
            }

            const t = new Date().getTime();
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data/${path}?t=${t}`;
            
            const headers = {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
            
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);

            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if (response.status === 404 && method === 'GET') return null; 
                    
                    const text = await response.text();
                    let errMsg = response.statusText;
                    try {
                        const errData = JSON.parse(text);
                        errMsg = errData.message || errMsg;
                    } catch(e) {}
                    throw new Error(errMsg);
                }
                return await response.json();
            } catch (error) {
                console.error(error);
                showMessage(`GitHub: ${error.message}`, 'error');
                return null;
            }
        }

        async function saveForm() {
            const floatBtn = document.getElementById('floating-save-btn');
            const floatText = document.getElementById('floating-save-text');

            let hasErrors = false;

            // Очищаем старые ошибки
            document.querySelectorAll('.ring-2.ring-red-500').forEach(el => {
                el.classList.remove('ring-2', 'ring-red-500', 'bg-red-50');
            });

            const originalFloatText = floatText.innerText;

            floatText.innerText = 'Сохранение...';
            floatBtn.disabled = true;

            const dataToSave = { raidDays: {} };

            // 1. Сохранение дат (календарь)
            document.querySelectorAll('.form-row').forEach(row => {
                const date = row.getAttribute('data-date');
                const startElem = row.querySelector('.entry-start');
                const endElem = row.querySelector('.entry-end');
                const start = startElem.value;
                const end = endElem.value;
                
                const checkedStatus = row.querySelector('.entry-status-radio:checked');
                const status = checkedStatus ? checkedStatus.value : null;

                const hasTime = start !== '' || end !== '';
                const hasStatus = status !== null;

                if (hasTime || hasStatus) {
                    if (hasTime && !hasStatus) {
                        const statusContainer = row.querySelector('.status-container');
                        if (statusContainer) statusContainer.classList.add('ring-2', 'ring-red-500', 'bg-red-50');
                        hasErrors = true;
                    }
                    if (hasStatus && !hasTime) {
                        startElem.classList.add('ring-2', 'ring-red-500');
                        endElem.classList.add('ring-2', 'ring-red-500');
                        hasErrors = true;
                    }
                    
                    if (!dataToSave[date]) dataToSave[date] = [];
                    if (!hasErrors) {
                        dataToSave[date].push({ status, start, end });
                    }
                }
            });

            // 2. Сохранение рейдовых дней (Среда-Вторник)
            document.querySelectorAll('.form-row-raid').forEach(row => {
                const dayName = row.getAttribute('data-day');
                const startElem = row.querySelector('.entry-start');
                const endElem = row.querySelector('.entry-end');
                const start = startElem.value;
                const end = endElem.value;
                
                const hasTime = start !== '' || end !== '';
                if (hasTime) {
                    if (start === '' || end === '') {
                        if (start === '') startElem.classList.add('ring-2', 'ring-red-500');
                        if (end === '') endElem.classList.add('ring-2', 'ring-red-500');
                        hasErrors = true;
                    }
                    if (!dataToSave.raidDays[dayName]) dataToSave.raidDays[dayName] = [];
                    if (!hasErrors) {
                        dataToSave.raidDays[dayName].push({ start, end });
                    }
                }
            });

            if (hasErrors) {
                showMessage('Укажите статус для выделенного времени (и наоборот)!', 'error');
                floatBtn.disabled = false;
                floatText.innerText = originalFloatText;
                return;
            }

            const jsonString = JSON.stringify(dataToSave, null, 2);
            const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

            const fileData = await githubAPI('GET', `${currentUser}.json`);
            const sha = fileData ? fileData.sha : null;

            const body = {
                message: `Update schedule for ${currentUser}`,
                content: base64Content
            };
            if (sha) body.sha = sha;

            const result = await githubAPI('PUT', `${currentUser}.json`, body);

            if (result) {
                floatText.innerText = `Сохранено!`;
                floatBtn.classList.replace('bg-green-600', 'bg-emerald-500');
                floatBtn.classList.replace('hover:bg-green-700', 'hover:bg-emerald-600');

        function timeToMins(timeStr) {
            if (!timeStr) return -1;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minsToTime(mins) {
            if (mins === 1440) return "24:00"; 
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

                let dayHtml = `
                    <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex flex-col hover:shadow-md transition-shadow w-full sm:w-[180px] lg:w-[190px]">
                        <div class="flex justify-center items-center gap-2 font-bold text-slate-700 border-b border-slate-100 pb-2 mb-3 tracking-tight">
                            <span class="w-14 text-right text-lg">${dateObj.datePart}</span>
                            <span class="text-slate-300">-</span>
                            <span class="w-14 text-left text-xl">${dateObj.dayPartShort}</span>
                        </div>
                        <div class="flex-1 flex flex-col gap-2">
                `;

                let minutePlayers = Array.from({length: 1440}, () => []);
                let hasAnyTimes = false;

                activePlayers.forEach(p => {
                    let pData = schedules[p]?.[dateObj.iso] || [];
                    pData.forEach(slot => {
                        if (slot.status === '+' || slot.status === '?') hasAnyTimes = true;
                        if (slot.status === '+' && slot.start && slot.end) {
                            let startM = timeToMins(slot.start);
                            let endM = timeToMins(slot.end);
                            if (endM <= startM) endM = 1440; 
                            for (let m = startM; m < endM; m++) {
                                if (!minutePlayers[m].includes(p)) minutePlayers[m].push(p);
                            }
                        }
                    });
                });

                let matches = [];
                let currentGroupStr = "";
                let currentStart = 0;

                for (let m = 0; m <= 1440; m++) {
                    let group = m < 1440 ? minutePlayers[m].sort() : [];
                    let groupStr = group.length >= 2 ? group.join(', ') : "";

                    if (groupStr !== currentGroupStr) {
                        if (currentGroupStr !== "") {
                            matches.push({ playersStr: currentGroupStr, start: currentStart, end: m });
                        }
                        currentGroupStr = groupStr;
                        currentStart = m;
                    }
                }

                if (matches.length > 0) {
                    matches.forEach(m => {
                        dayHtml += `
                            <div class="bg-green-50 border border-green-200 text-green-800 rounded-lg p-2 text-center mb-2 shadow-inner">
                                <span class="block text-[11px] font-black tracking-wider text-green-700 mb-0.5">${m.playersStr}</span>
                                <span class="font-black text-sm leading-tight tracking-wide">${minsToTime(m.start)} - ${minsToTime(m.end)}</span>
                            </div>
                        `;
                    });
                } else if (hasAnyTimes) {
                     dayHtml += `<div class="bg-slate-50 border border-slate-200 text-slate-500 rounded-lg p-2 text-center mb-2 text-xs font-bold">Нет общего времени</div>`;
                } else {
                    dayHtml += `<div class="bg-slate-50 border border-slate-200 text-slate-400 rounded-lg p-2 text-center mb-2 text-xs font-bold italic">Пусто</div>`;
                }

                let statusesHtml = '';
                activePlayers.forEach(p => {
                    let pData = schedules[p]?.[dateObj.iso] || [];
                    pData.forEach(slot => {
                        if (!slot.start) return; 
                        
                        let colorClass = 'bg-slate-100 text-slate-600 border-slate-200';
                        let timeText = `${slot.start}-${slot.end}`; 
                        
                        if (slot.status === '+') colorClass = 'bg-blue-50 text-blue-700 border-blue-200';
                        if (slot.status === '?') colorClass = 'bg-yellow-50 text-yellow-700 border-yellow-300';

                        statusesHtml += `
                            <div class="flex flex-col items-center justify-center p-1.5 px-2 border rounded-md ${colorClass} shadow-sm font-bold">
                                <span class="break-words text-center text-[13px] leading-tight mb-0.5">${p}</span>
                                <span class="whitespace-nowrap text-[11px] opacity-80 leading-none">${timeText}</span>
                            </div>
                        `;
                    });
                });

                if (statusesHtml) dayHtml += `<div class="flex flex-col gap-1.5 mt-auto pt-2 border-t border-slate-100">${statusesHtml}</div>`;
                dayHtml += `</div></div>`;
                
                if (index < 7) week1Html += dayHtml;
                else week2Html += dayHtml;
            });

            week1Html += `</div></div>`;
            week2Html += `</div></div>`;
            
            if (hasWeek1Days) finalHtml += week1Html;
            if (hasWeek2Days) finalHtml += week2Html;

            // 3. Рендер ТАЙМЛАЙНА рейдовых дней (Среда-Вторник)
            let raidTimelineHtml = `
                <div class="mt-12 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8 overflow-x-auto">
                    <h3 class="text-xl font-black text-slate-800 mb-8 uppercase tracking-wide text-center">Рейдовое расписание</h3>
                    <div class="min-w-[700px]">
                        <!-- Шапка дней -->
                        <div class="flex border-b-2 border-slate-200 pb-3 mb-4">
                            <div class="w-24 shrink-0 font-bold text-slate-400 text-sm flex items-end justify-center uppercase tracking-wider">Игрок</div>
            `;
            RAID_DAYS.forEach(day => {
                raidTimelineHtml += `<div class="flex-1 text-center font-bold text-slate-500 uppercase tracking-widest text-xs">${RAID_DAYS_MAP[day]}</div>`;
            });
            raidTimelineHtml += `</div>`;

            const colors = [
                {bg: 'bg-blue-100', border: 'border-blue-200', text: 'text-blue-800'},
                {bg: 'bg-green-100', border: 'border-green-200', text: 'text-green-800'},
                {bg: 'bg-purple-100', border: 'border-purple-200', text: 'text-purple-800'},
                {bg: 'bg-orange-100', border: 'border-orange-200', text: 'text-orange-800'}
            ];

            activePlayers.forEach((p, pIndex) => {
                const raidData = schedules[p]?.raidDays || {};
                let hasAnyRaidData = false;
                
                for(let d of RAID_DAYS) {
                    if (raidData[d] && raidData[d].length > 0) hasAnyRaidData = true;
                }
                
                if (!hasAnyRaidData) return; 

                const pColor = colors[pIndex % colors.length];

                raidTimelineHtml += `<div class="flex relative mb-4 items-center group">`;
                raidTimelineHtml += `<div class="w-24 shrink-0 font-black text-slate-700 text-right pr-4 text-sm truncate">${p}</div>`;
                
                // Изолируем таймлайн в гибкий контейнер
                raidTimelineHtml += `<div class="flex-1 relative flex h-10">`;

                // Рисуем подложки
                RAID_DAYS.forEach(() => {
                    raidTimelineHtml += `<div class="flex-1 border-x border-dashed border-slate-100 bg-slate-50/50 mx-[1px] rounded-sm h-full"></div>`;
                });

                // Вычисляем объединенные блоки
                let currentBlock = null;
                const blocks = [];
                
                RAID_DAYS.forEach((day, dIndex) => {
                    let entry = raidData[day]?.[0]; // Берем первую запись для таймлайна
                    if (entry && entry.start && entry.end) {
                        const timeStr = `${entry.start}-${entry.end}`;
                        if (currentBlock && currentBlock.timeStr === timeStr) {
                            currentBlock.span++;
                        } else {
                            if (currentBlock) blocks.push(currentBlock);
                            currentBlock = { startIdx: dIndex, span: 1, timeStr: timeStr };
                        }
                    } else {
                        if (currentBlock) {
                            blocks.push(currentBlock);
                            currentBlock = null;
                        }
                    }
                });
                if (currentBlock) blocks.push(currentBlock);

                // Отрисовываем цветные плашки поверх подложек
                const trackWidthPercent = 100 / RAID_DAYS.length;
                blocks.forEach(b => {
                    const leftPos = `calc(${b.startIdx * trackWidthPercent}%)`; 
                    const widthVal = `calc(${b.span * trackWidthPercent}%)`;
                    
                    raidTimelineHtml += `
                        <div class="absolute h-full flex items-center justify-center rounded-full border ${pColor.bg} ${pColor.border} ${pColor.text} font-bold text-xs shadow-sm transition-transform transform group-hover:scale-[1.02] z-10 cursor-default" 
                             style="left: ${leftPos}; width: ${widthVal}; margin-left: 2px; padding-right: 4px;">
                            ${b.timeStr}
                        </div>
                    `;
                });

                raidTimelineHtml += `</div></div>`; // Закрываем контейнер таймлайна и строку
            });

            raidTimelineHtml += `</div></div>`;
            finalHtml += raidTimelineHtml;

            container.innerHTML = finalHtml;
        }

    </script>
</body>
</html>
